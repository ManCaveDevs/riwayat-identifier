<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riwayah Identifier</title>
    <meta name="description" content="Identify which riwayah (Quranic recitation) you're listening to. Covers all 20 riwayat from the 10 canonical qira'at.">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;0,9..40,800;1,9..40,400&family=Amiri:wght@400;700&display=swap">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
  </head>
  <body>
    <script>
      // Decode redirect from 404.html (GitHub Pages SPA workaround)
      (function() {
        var q = window.location.search;
        if (q.length > 2 && q[1] === '/') {
          var decoded = q.slice(2).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          var path = decoded[0];
          window.history.replaceState(null, null,
            window.location.pathname + (path ? path : '') +
            (decoded.length > 1 ? '?' + decoded.slice(1).join('&') : '') +
            window.location.hash
          );
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script data-goatcounter="https://riwayat-identifier.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
