<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riwayah Identifier</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
  </head>
  <body>
    <script>
      // Decode redirect from 404.html (GitHub Pages SPA workaround)
      (function() {
        var q = window.location.search;
        if (q.length > 2 && q[1] === '/') {
          var decoded = q.slice(2).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          var path = decoded[0];
          window.history.replaceState(null, null,
            window.location.pathname + (path ? path : '') +
            (decoded.length > 1 ? '?' + decoded.slice(1).join('&') : '') +
            window.location.hash
          );
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
